<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribeAI - Advanced Content Platform</title>
    <!-- CSS File Link ki gayi hai -->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="master-layout-container">
        
        <!-- SIDEBAR CONTAINER -->
        <aside id="chatSidebar" class="sidebar-wrapper">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">+ New Generation</button>
            </div>
            <div class="sidebar-history">
                <div class="history-meta-row">
                    <div class="history-label">Activity Log</div>
                    <button class="clear-history-action" onclick="clearHistory()">Clear All</button>
                </div>
                <ul class="history-list-box" id="historyList"></ul>
            </div>
        </aside>

        <!-- MAIN PRODUCTION CANVAS -->
        <div class="app-main-layout">
            <header class="navbar">
                <div class="logo-container" onclick="showMainPage()" style="cursor: pointer;">
                    <div class="scribe-text-logo">Scribe AI</div>
                </div>
                <div class="nav-utility-controls">
                    <button class="theme-toggle-trigger" onclick="toggleTheme()" title="Toggle View Theme">🌓</button>
                    <button class="btn-link">Sign In</button>
                    <button class="btn-primary-sm">Sign Up</button>
                </div>
            </header>

            <!-- CORE PRESENTATION CONTROLLER -->
            <div class="page-block">
                <div class="main-content">
                    <div class="welcome-section" id="welcomeSection">
                        <h1>How can I help you create today?</h1>
                        <p>Generate highly comprehensive video scripts or talk directly with our advanced AI orchestrator system.</p>
                    </div>

                    <!-- AI CONTAINER FEEDBACK OUTPUT -->
                    <div class="result-area" id="resultArea">
                        <div class="result-header-row">
                            <div class="result-header" id="resultHeader">AI Generated Output</div>
                            <div class="output-actions-group">
                                <button class="action-tool-btn" onclick="copyToClipboard()">📋 Copy</button>
                                <button class="action-tool-btn" onclick="downloadOutputText()">💾 Download</button>
                            </div>
                        </div>
                        <div class="script-body" id="scriptBody"></div>
                    </div>
                </div>

                <!-- DESK CONSOLE ENGINE CONTROL -->
                <div class="input-container-wrap">
                    <div class="input-box-card">
                        <div class="generation-modes-row">
                            <div class="generation-modes">
                                <button class="mode-btn active" id="modeScript" onclick="setMode('script')">Script Engine</button>
                                <button class="mode-btn" id="modeAsk" onclick="setMode('ask')">Direct AI Chat</button>
                            </div>
                            <div class="advanced-settings" id="advancedSettingsPanel">
                                <select class="settings-dropdown" id="aspectRatioSelect">
                                    <option value="16:9">16:9 Cinema</option>
                                    <option value="9:16">9:16 Shorts/Reels</option>
                                    <option value="1:1">1:1 Square Feed</option>
                                </select>
                                <select class="settings-dropdown" id="toneSelect">
                                    <option value="Professional">Professional</option>
                                    <option value="Casual">Casual Narration</option>
                                    <option value="Dramatic">Dramatic Story</option>
                                    <option value="Humorous">Humorous Script</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-field-container">
                            <input type="text" id="topicInput" placeholder="Enter script topic...">
                            <button id="generateBtn" onclick="handleGeneration()">➔</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <!-- PIPELINE SCRIPT LOGIC CORE -->
    <script>
        // ⚠️ ZAROORI: Apne live Vercel backend ka sahi URL yahan quote ke andar paste karein
        const BACKEND_BASE_URL = 'https://vercel.app'; 

        let currentMode = 'script';

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', targetTheme);
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeScript').classList.toggle('active', mode === 'script');
            document.getElementById('modeAsk').classList.toggle('active', mode === 'ask');
            
            document.getElementById('advancedSettingsPanel').style.display = mode === 'script' ? 'flex' : 'none';
            document.getElementById('topicInput').placeholder = mode === 'script' ? 'Enter script topic...' : 'Ask anything...';
        }

        async function handleGeneration() {
            const inputVal = document.getElementById('topicInput').value.trim();
            if (!inputVal) return alert('Please enter some text first!');

            const btn = document.getElementById('generateBtn');
            const resultArea = document.getElementById('resultArea');
            const welcomeSection = document.getElementById('welcomeSection');
            const scriptBody = document.getElementById('scriptBody');
            const resultHeader = document.getElementById('resultHeader');

            btn.disabled = true;
            btn.innerText = '...';

            try {
                let response;
                if (currentMode === 'script') {
                    const size = document.getElementById('aspectRatioSelect').value;
                    const tone = document.getElementById('toneSelect').value;

                    response = await fetch(`${BACKEND_BASE_URL}/api/generate-script`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ topic: inputVal, size, tone })
                    });
                    
                    const data = await response.json();
                    if(data.success) {
                        welcomeSection.style.display = 'none';
                        resultArea.style.display = 'block';
                        resultHeader.innerText = '🎬 Generated Video Script';
                        scriptBody.innerText = data.script;
                        saveToHistory(`Script: ${inputVal}`);
                    } else {
                        alert('Generation failed: ' + (data.error || 'Unknown Error'));
                    }

                } else {
                    response = await fetch(`${BACKEND_BASE_URL}/api/ask-question`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: inputVal })
                    });

                    const data = await response.json();
                    if(data.success) {
                        welcomeSection.style.display = 'none';
                        resultArea.style.display = 'block';
                        resultHeader.innerText = '🤖 AI Response';
                        scriptBody.innerText = data.answer;
                        saveToHistory(`Ask: ${inputVal}`);
                    } else {
                        alert('Query failed: ' + (data.error || 'Unknown Error'));
                    }
                }
            } catch (error) {
                console.error('Fetch System Error:', error);
                alert('Could not connect to backend server. Ensure CORS and Backend URL are correct.');
            } finally {
                btn.disabled = false;
                btn.innerText = '➔';
            }
        }

        function saveToHistory(text) {
            const list = document.getElementById('historyList');
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerText = text;
            list.prepend(li);
        }

        function clearHistory() {
            document.getElementById('historyList').innerHTML = '';
        }

        function copyToClipboard() {
            const text = document.getElementById('scriptBody').innerText;
            if(!text) return;
            navigator.clipboard.writeText(text);
            alert('Text copied to clipboard successfully!');
        }

        function downloadOutputText() {
            const text = document.getElementById('scriptBody').innerText;
            if(!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'scribe-ai-output.txt';
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
            window.URL.revokeObjectURL(anchor.href);
        }

        function startNewChat() {
            document.getElementById('welcomeSection').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('topicInput').value = '';
        }

        function showMainPage() {
            startNewChat();
        }
    </script>
</body>
</html>
